global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: timescaledb
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # Optional application-level targets.
  # Enable /metrics endpoints in services and add them here.
  - job_name: sentinelflow-apps
    static_configs:
      - targets:
          - "host.docker.internal:2112" # ingestion
          - "host.docker.internal:2113" # stream-processor
          - "host.docker.internal:2114" # opcua-adapter
          - "host.docker.internal:2115" # persistence
          - "host.docker.internal:2116" # graphql-api
